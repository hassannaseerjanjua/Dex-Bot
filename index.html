<!doctype html>
<html>
  <head>
    <style>
      @import url("https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap");

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        padding: 0;
        color: white;
        font-family: "Inter", Arial, sans-serif;
        border-radius: 12px;
        overflow: hidden;
        background: linear-gradient(160deg, #0f0f1a 0%, #111827 100%);
        height: 540px;
        display: flex;
        flex-direction: column;
      }

      /* ── Header ── */
      .header {
        -webkit-app-region: drag;
        height: 36px;
        background: linear-gradient(90deg, #5ee6ff22, #a78bfa22);
        backdrop-filter: blur(10px);
        border-bottom: 1px solid #5ee6ff33;
        cursor: move;
        color: #c8f0ff;
        position: relative;
        display: flex;
        align-items: center;
        padding: 0 10px;
        flex-shrink: 0;
      }
      .header h3 {
        margin: 0;
        font-size: 13px;
        font-weight: 600;
        letter-spacing: 0.5px;
      }

      input,
      button {
        -webkit-app-region: no-drag;
      }

      #closeBtn {
        -webkit-app-region: no-drag;
        background: transparent;
        border: none;
        position: absolute;
        top: 50%;
        right: 8px;
        transform: translateY(-50%);
        cursor: pointer;
        font-size: 14px;
        opacity: 0.7;
        transition: opacity 0.2s;
      }
      #closeBtn:hover {
        opacity: 1;
      }

      /* ── Bot SVG area ── */
      .bot {
        display: flex;
        justify-content: center;
        align-items: center;
        flex-shrink: 0;
        padding: 4px 0 0;
      }

      /* ── Voice interface ── */
      .voice-container {
        flex: 1;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding-bottom: 30px;
        gap: 20px;
      }

      #micBtn {
        width: 72px;
        height: 72px;
        border-radius: 50%;
        background: linear-gradient(135deg, #5ee6ff, #a78bfa);
        border: none;
        cursor: pointer;
        font-size: 28px;
        display: flex;
        justify-content: center;
        align-items: center;
        box-shadow: 0 8px 32px rgba(94, 230, 255, 0.3);
        transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        color: #0f0f1a;
        -webkit-app-region: no-drag;
        padding: 0;
      }

      #micBtn:hover {
        transform: scale(1.1);
        box-shadow: 0 12px 40px rgba(94, 230, 255, 0.5);
      }

      #micBtn:active {
        transform: scale(0.92);
      }

      #micBtn.recording {
        background: #ff4b4b;
        box-shadow: 0 0 30px rgba(255, 75, 75, 0.6);
        animation: pulseRecord 1.5s infinite;
      }

      @keyframes pulseRecord {
        0% { box-shadow: 0 0 0 0 rgba(255, 75, 75, 0.7); }
        70% { box-shadow: 0 0 0 20px rgba(255, 75, 75, 0); }
        100% { box-shadow: 0 0 0 0 rgba(255, 75, 75, 0); }
      }

      #statusText {
        font-size: 14px;
        color: #5ee6ff;
        opacity: 0.8;
        font-weight: 500;
        height: 20px;
        text-align: center;
        transition: opacity 0.3s;
      }

      /* ── Bot Animation ── */
      .bot.speaking svg {
        animation: speakingGlow 2s infinite ease-in-out;
      }

      @keyframes speakingGlow {
        0%, 100% { filter: drop-shadow(0 0 5px rgba(94, 230, 255, 0.2)); }
        50% { filter: drop-shadow(0 0 15px rgba(94, 230, 255, 0.6)); }
      }
    </style>
  </head>
  <body>
    <header class="header">
      <h3>🤖 Dex Bot</h3>
      <button id="closeBtn">❌</button>
    </header>
    <div class="bot">
      <svg
        width="220"
        height="300"
        viewBox="0 0 220 300"
        xmlns="http://www.w3.org/2000/svg"
      >
        <defs>
          <!-- Body Gradient -->
          <radialGradient id="bodyGrad" cx="50%" cy="40%" r="60%">
            <stop offset="0%" stop-color="#ffffff" />
            <stop offset="60%" stop-color="#eaeaea" />
            <stop offset="100%" stop-color="#d6d6d6" />
          </radialGradient>

          <!-- Screen Gradient -->
          <radialGradient id="screenGrad" cx="50%" cy="40%" r="70%">
            <stop offset="0%" stop-color="#1c1c1c" />
            <stop offset="100%" stop-color="#000000" />
          </radialGradient>

          <!-- Glow -->
          <radialGradient id="glowBlue">
            <stop offset="0%" stop-color="#5ee6ff" stop-opacity="1" />
            <stop offset="100%" stop-color="#5ee6ff" stop-opacity="0" />
          </radialGradient>

          <!-- Soft Shadow -->
          <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
            <feDropShadow
              dx="0"
              dy="6"
              stdDeviation="6"
              flood-color="#000"
              flood-opacity="0.2"
            />
          </filter>
        </defs>

        <!-- Ground Shadow -->
        <ellipse cx="110" cy="270" rx="70" ry="18" fill="#000" opacity="0.1" />

        <!-- Body -->
        <ellipse
          cx="110"
          cy="170"
          rx="65"
          ry="80"
          fill="url(#bodyGrad)"
          filter="url(#shadow)"
        />

        <!-- Arms -->
        <ellipse cx="35" cy="165" rx="18" ry="45" fill="url(#bodyGrad)" />
        <ellipse cx="185" cy="165" rx="18" ry="45" fill="url(#bodyGrad)" />

        <!-- Head -->
        <ellipse
          cx="110"
          cy="80"
          rx="55"
          ry="50"
          fill="url(#bodyGrad)"
          filter="url(#shadow)"
        />

        <!-- Screen -->
        <ellipse cx="110" cy="80" rx="38" ry="32" fill="url(#screenGrad)" />

        <!-- Screen Reflection -->
        <ellipse
          cx="100"
          cy="65"
          rx="20"
          ry="10"
          fill="#ffffff"
          opacity="0.08"
        />

        <!-- Eyes Glow -->
        <circle cx="95" cy="80" r="10" fill="url(#glowBlue)" opacity="0.6" />
        <circle cx="125" cy="80" r="10" fill="url(#glowBlue)" opacity="0.6" />

        <!-- Eyes -->
        <circle cx="95" cy="80" r="5" fill="#8ff3ff" />
        <circle cx="125" cy="80" r="5" fill="#8ff3ff" />

        <!-- Chest Light Glow -->
        <ellipse
          cx="110"
          cy="155"
          rx="25"
          ry="30"
          fill="url(#glowBlue)"
          opacity="0.4"
        />

        <!-- Chest Light Core -->
        <path d="M95 150 Q110 125 125 150 Q110 180 95 150" fill="#7fefff" />

        <!-- Neck Accent -->
        <rect x="95" y="115" width="30" height="18" rx="8" fill="#c9f7f5" />
      </svg>
    </div>

    <div class="voice-container">
      <div id="statusText">Ready to help</div>
      <button id="micBtn" title="Hold to speak">🎤</button>
    </div>

    <script src="renderer.js"></script>
  </body>
</html>
