<!doctype html>
<html>
  <head>
    <style>
      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        padding: 0;
        overflow: hidden;
        background: transparent;
        width: 280px;
        height: 280px;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .orb-container {
        width: 250px;
        height: 250px;
        border-radius: 64px;
        background: linear-gradient(
          135deg,
          rgba(30, 20, 45, 0.85) 0%,
          rgba(15, 10, 25, 0.95) 100%
        );
        backdrop-filter: blur(20px);
        -webkit-backdrop-filter: blur(20px);
        /* box-shadow:
          inset 0 0 0 1px rgba(167, 139, 250, 0.15),
          inset 0 0 20px rgba(167, 139, 250, 0.05),
          0 20px 40px rgba(0, 0, 0, 0.5); */
        display: flex;
        align-items: center;
        justify-content: center;
        position: relative;
      }

      #orbCanvas {
        width: 220px;
        height: 220px;
        -webkit-app-region: drag;
        cursor: pointer; /* indicates it can be clicked to manual-trigger mic */
      }
    </style>
  </head>
  <body>
    <div class="orb-container">
      <canvas id="orbCanvas"></canvas>
    </div>
    <script src="renderer.js"></script>
  </body>
</html>
