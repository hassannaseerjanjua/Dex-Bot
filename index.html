<!doctype html>
<html>
  <head>
    <style>
      @import url("https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap");

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        padding: 0;
        color: white;
        font-family:
          "Inter",
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          Roboto,
          sans-serif;
        border-radius: 16px;
        overflow: hidden;
        background: #09090e;
        height: 540px;
        display: flex;
        flex-direction: column;
        position: relative;
      }

      /* ── Mesh Gradient Background ── */
      .bg-glow {
        position: absolute;
        width: 500px;
        height: 500px;
        background: radial-gradient(
          circle,
          rgba(167, 139, 250, 0.08) 0%,
          transparent 70%
        );
        top: -150px;
        left: -150px;
        z-index: -1;
        filter: blur(40px);
      }

      /* ── Header ── */
      .header {
        -webkit-app-region: drag;
        height: 44px;
        background: transparent;
        display: flex;
        align-items: center;
        padding: 0 16px;
        flex-shrink: 0;
        z-index: 100;
      }
      .header h3 {
        margin: 0;
        font-size: 14px;
        font-weight: 500;
        letter-spacing: 0.5px;
        color: rgba(255, 255, 255, 0.6);
        display: flex;
        align-items: center;
        gap: 8px;
      }

      #closeBtn {
        -webkit-app-region: no-drag;
        background: rgba(255, 255, 255, 0.05);
        border: 1px solid rgba(255, 255, 255, 0.1);
        width: 24px;
        height: 24px;
        border-radius: 6px;
        position: absolute;
        right: 12px;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        color: white;
        font-size: 10px;
        transition: all 0.2s;
      }
      #closeBtn:hover {
        background: rgba(239, 68, 68, 0.2);
        border-color: rgba(239, 68, 68, 0.3);
      }

      /* ── Orb Container ── */
      .bot {
        flex: 1;
        display: flex;
        justify-content: center;
        align-items: center;
        position: relative;
        z-index: 10;
        margin-top: 20px;
      }

      .orb-container {
        width: 280px;
        height: 280px;
        border-radius: 64px;
        background: rgba(255, 255, 255, 0.015);
        box-shadow:
          inset 0 0 0 1px rgba(255, 255, 255, 0.04),
          0 20px 40px rgba(0, 0, 0, 0.2);
        display: flex;
        align-items: center;
        justify-content: center;
        position: relative;
      }

      #orbCanvas {
        width: 260px;
        height: 260px;
      }

      /* ── Voice Container ── */
      .voice-container {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: flex-end;
        padding-bottom: 30px;
        gap: 20px;
        z-index: 10;
      }

      #statusText {
        font-size: 13px;
        color: rgba(167, 139, 250, 0.8);
        font-weight: 500;
        letter-spacing: 0.3px;
        text-transform: uppercase;
      }

      /* ── Premium Mic Button ── */
      .mic-outer {
        position: relative;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      #micBtn {
        width: 56px;
        height: 56px;
        border-radius: 50%;
        background: rgba(255, 255, 255, 0.05);
        border: 1px solid rgba(255, 255, 255, 0.1);
        cursor: pointer;
        font-size: 20px;
        display: flex;
        justify-content: center;
        align-items: center;
        transition: all 0.3s ease;
        color: white;
        -webkit-app-region: no-drag;
        padding: 0;
        z-index: 2;
      }

      #micBtn:hover {
        background: rgba(255, 255, 255, 0.1);
        border-color: rgba(255, 255, 255, 0.2);
        transform: scale(1.05);
      }

      #micBtn.recording {
        background: rgba(167, 139, 250, 0.2);
        border-color: rgba(167, 139, 250, 0.5);
        color: #a78bfa;
        box-shadow: 0 0 20px rgba(167, 139, 250, 0.2);
      }
    </style>
  </head>
  <body>
    <div class="bg-glow"></div>

    <header class="header">
      <h3>Dex Assistant</h3>
      <button id="closeBtn">✖</button>
    </header>

    <div class="bot">
      <div class="orb-container">
        <canvas id="orbCanvas"></canvas>
      </div>
    </div>

    <div class="voice-container">
      <div id="statusText">System Ready</div>
      <div class="mic-outer">
        <button id="micBtn" title="Click to speak">🎤</button>
      </div>
    </div>

    <script src="renderer.js"></script>
  </body>
</html>
