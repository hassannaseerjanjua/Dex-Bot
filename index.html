<!doctype html>
<html>
  <head>
    <style>
      body {
        margin: 0;
        padding: 0;
        color: white;
        font-family: Arial;
        border-radius: 10px;
      }
      .bot {
        display: flex;
        justify-content: center;
        align-items: center;
      }
      .header {
        -webkit-app-region: drag;
        height: 30px;
        background: rgb(135, 216, 243);
        cursor: move;
        color: #000;
        position: relative;
        padding: 2px;
      }
      .header h3 {
        margin: 0;
        line-height: 30px;
      }
      input,
      button {
        -webkit-app-region: no-drag;
      }
      #closeBtn {
        -webkit-app-region: no-drag;
        background: transparent;
        border: none;
        position: absolute;
        top: 1px;
        right: 0;
        cursor: pointer;
        font-size: 16px;
      }
    </style>
  </head>
  <body>
    <header class="header">
      <h3>🤖 Dex Bot</h3>
      <button id="closeBtn">❌</button>
    </header>
    <div class="bot">
      <svg
        width="220"
        height="300"
        viewBox="0 0 220 300"
        xmlns="http://www.w3.org/2000/svg"
      >
        <defs>
          <!-- Body Gradient -->
          <radialGradient id="bodyGrad" cx="50%" cy="40%" r="60%">
            <stop offset="0%" stop-color="#ffffff" />
            <stop offset="60%" stop-color="#eaeaea" />
            <stop offset="100%" stop-color="#d6d6d6" />
          </radialGradient>

          <!-- Screen Gradient -->
          <radialGradient id="screenGrad" cx="50%" cy="40%" r="70%">
            <stop offset="0%" stop-color="#1c1c1c" />
            <stop offset="100%" stop-color="#000000" />
          </radialGradient>

          <!-- Glow -->
          <radialGradient id="glowBlue">
            <stop offset="0%" stop-color="#5ee6ff" stop-opacity="1" />
            <stop offset="100%" stop-color="#5ee6ff" stop-opacity="0" />
          </radialGradient>

          <!-- Soft Shadow -->
          <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
            <feDropShadow
              dx="0"
              dy="6"
              stdDeviation="6"
              flood-color="#000"
              flood-opacity="0.2"
            />
          </filter>
        </defs>

        <!-- Ground Shadow -->
        <ellipse cx="110" cy="270" rx="70" ry="18" fill="#000" opacity="0.1" />

        <!-- Body -->
        <ellipse
          cx="110"
          cy="170"
          rx="65"
          ry="80"
          fill="url(#bodyGrad)"
          filter="url(#shadow)"
        />

        <!-- Arms -->
        <ellipse cx="35" cy="165" rx="18" ry="45" fill="url(#bodyGrad)" />
        <ellipse cx="185" cy="165" rx="18" ry="45" fill="url(#bodyGrad)" />

        <!-- Head -->
        <ellipse
          cx="110"
          cy="80"
          rx="55"
          ry="50"
          fill="url(#bodyGrad)"
          filter="url(#shadow)"
        />

        <!-- Screen -->
        <ellipse cx="110" cy="80" rx="38" ry="32" fill="url(#screenGrad)" />

        <!-- Screen Reflection -->
        <ellipse
          cx="100"
          cy="65"
          rx="20"
          ry="10"
          fill="#ffffff"
          opacity="0.08"
        />

        <!-- Eyes Glow -->
        <circle cx="95" cy="80" r="10" fill="url(#glowBlue)" opacity="0.6" />
        <circle cx="125" cy="80" r="10" fill="url(#glowBlue)" opacity="0.6" />

        <!-- Eyes -->
        <circle cx="95" cy="80" r="5" fill="#8ff3ff" />
        <circle cx="125" cy="80" r="5" fill="#8ff3ff" />

        <!-- Chest Light Glow -->
        <ellipse
          cx="110"
          cy="155"
          rx="25"
          ry="30"
          fill="url(#glowBlue)"
          opacity="0.4"
        />

        <!-- Chest Light Core -->
        <path d="M95 150 Q110 125 125 150 Q110 180 95 150" fill="#7fefff" />

        <!-- Neck Accent -->
        <rect x="95" y="115" width="30" height="18" rx="8" fill="#c9f7f5" />
      </svg>
    </div>

    <script src="renderer.js"></script>
  </body>
</html>
